<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Inscripción</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Formulario de Inscripción</h1>

    <form id="formularioInscripcion" action="procesar.php" method="POST">
        
        <fieldset>
            <legend>Datos Personales</legend>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Introduce tu nombre" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>

            <label for="lenguaje">Lenguaje favorito:</label>
            <select id="lenguaje" name="lenguaje">
                <option value="html">HTML</option>
                <option value="js">JavaScript</option>
                <option value="python">Python</option>
            </select>

            <label for="comentarios">Motivación:</label>
            <textarea id="comentarios" name="comentarios" placeholder="Cuéntanos por qué te interesa..." maxlength="200"></textarea>

        </fieldset>

        <button type="submit">Enviar</button>

    </form>

    <script src="script.js"></script>
</body>
</html>
